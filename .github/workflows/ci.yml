name: CI

on:
  pull_request:
    branches: [dev, staging, main]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://user:pass@localhost/fake?sslmode=require
      BETTER_AUTH_SECRET: ci-dummy-secret-not-real-at-least-32chars
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_dummy_key_not_real
      EMAIL_FROM: onboarding@resend.dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Docker build
        run: |
          docker build \
            --build-arg DATABASE_URL="$DATABASE_URL" \
            --build-arg BETTER_AUTH_SECRET="$BETTER_AUTH_SECRET" \
            --build-arg BETTER_AUTH_URL="$BETTER_AUTH_URL" \
            --build-arg RESEND_API_KEY="$RESEND_API_KEY" \
            --build-arg EMAIL_FROM="$EMAIL_FROM" \
            -t cresora-roi-calculator:ci .
