name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx drizzle-kit migrate

  test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://user:pass@localhost/fake?sslmode=require
      BETTER_AUTH_SECRET: ci-dummy-secret-not-real-at-least-32chars
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_dummy_key_not_real
      EMAIL_FROM: onboarding@resend.dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [migrate, test]
    environment: staging

    steps:
      - name: Wait for Vercel deployment
        run: sleep 60

      - name: Health check
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          if [ -z "$STAGING_URL" ]; then
            echo "STAGING_URL not set, skipping health check"
            exit 0
          fi
          status=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health")
          if [ "$status" != "200" ]; then
            echo "Health check failed with status $status"
            exit 1
          fi
          echo "Health check passed"
